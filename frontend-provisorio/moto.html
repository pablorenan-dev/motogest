<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Motos - Motogest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-placeholder">M</div>
        <a href="home.html" class="nav-item">- Home</a>
        <a href="estoque.html" class="nav-item">- Estoque</a>
        <a href="moto.html" class="nav-item active">- Motos</a>
        <a href="vendas.html" class="nav-item">- Vendas</a>
    </aside>

    <main class="main-content">
        <div class="estoque-header">
            <h2>Motos</h2>
            <div class="estoque-controls">
                <input type="text" placeholder="Filtro modelo moto">
                <button class="btn-add" onclick="abrirModal('modal-add-motos')">+</button>
            </div>
        </div>

        <table class="item-list">
            <thead>
                <tr>
                    <th>Modelo</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-motos"></tbody>
        </table>
    </main>

    <div id="modal-add-motos" class="modal-overlay" onclick="fecharModalFora(event, 'modal-add-motos')">
        <div class="modal-content">
            <h3>Adicionar Moto</h3>
            <input type="text" id="add-nome" placeholder="modelo da moto">
            <input type="text" id="add-desc" placeholder="descrição">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modal-add-motos')">Cancelar</button>
                <button class="btn-confirm" onclick="adicionarMoto()">Adicionar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="modal-overlay" onclick="fecharModalFora(event, 'modal-edit')">
        <div class="modal-content">
            <h3>Editar Moto</h3>
            <input type="text" id="edit-nome" placeholder="modelo da moto">
            <input type="text" id="edit-desc" placeholder="descrição">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modal-edit')">Cancelar</button>
                <button class="btn-confirm" onclick="salvarEdicaoMoto()">Salvar Edição</button>
            </div>
        </div>
    </div>

    <div id="modal-delete" class="modal-overlay" onclick="fecharModalFora(event, 'modal-delete')">
        <div class="modal-content" style="width: auto;">
            <h3 style="margin-bottom: 10px;">Deseja deletar mesmo?</h3>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="deletarMoto()">Sim</button>
                <button class="btn-reject" onclick="fecharModal('modal-delete')">Não</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
