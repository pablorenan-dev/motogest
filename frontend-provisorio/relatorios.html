<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatórios - Motogest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">Motogest</span>
        </div>
        <a href="home.html" class="nav-item">Home</a>
        <a href="estoque.html" class="nav-item">Estoque</a>
        <a href="moto.html" class="nav-item">Motos</a>
        <a href="contato.html" class="nav-item">Contatos</a>
        <a href="vendas.html" class="nav-item">Vendas</a>
        <a href="relatorios.html"    class="nav-item active">Relatórios</a>
        <a href="chats.html"         class="nav-item">Chats</a>
        <a href="configuracoes.html" class="nav-item">Configurações</a>
        <a href="servicos.html" class="nav-item">Serviços</a>
    </aside>

    <main class="main-content">
        <div class="estoque-header">
            <h2>Relatórios</h2>
        </div>

        <!-- Cards de resumo -->
        <div class="resumo-cards">
            <div class="resumo-card">
                <div class="resumo-label">Total de vendas</div>
                <div class="resumo-valor" id="resumo-qtd">-</div>
            </div>
            <div class="resumo-card">
                <div class="resumo-label">Receita total</div>
                <div class="resumo-valor" id="resumo-total">-</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="relatorio-filtros">
            <label>De: <input type="date" id="filtro-inicio"></label>
            <label>Até: <input type="date" id="filtro-fim"></label>
            <button class="btn-add" onclick="filtrarVendas()">Filtrar</button>
            <button class="btn-cancel" onclick="limparFiltros()">Limpar</button>
        </div>

        <!-- Gráficos -->
        <div class="graficos-row">
            <div class="grafico-card">
                <div class="grafico-titulo">Receita por dia</div>
                <div class="grafico-container">
                    <canvas id="grafico-vendas"></canvas>
                </div>
            </div>
            <div class="grafico-card">
                <div class="grafico-titulo">Produtos mais vendidos</div>
                <div class="grafico-container grafico-pizza-container">
                    <canvas id="grafico-pizza"></canvas>
                </div>
            </div>
        </div>

        <!-- Tabela de histórico -->
        <table class="item-list" style="margin-top: 30px; width: 100%;">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Itens</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="lista-vendas"></tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
