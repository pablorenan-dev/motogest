<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque - Motogest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">M</div>
            <span class="logo-text">Motogest</span>
        </div>
        <a href="home.html" class="nav-item">Home</a>
        <a href="estoque.html" class="nav-item active">Estoque</a>
        <a href="moto.html" class="nav-item">Motos</a>
        <a href="contato.html" class="nav-item">Contatos</a>
        <a href="servicos.html" class="nav-item">Serviços</a>
        <a href="vendas.html" class="nav-item">Vendas</a>
        <a href="relatorios.html" class="nav-item">Relatórios</a>
        <a href="chats.html" class="nav-item">Chats</a>
        <a href="configuracoes.html" class="nav-item">Configurações</a>
    </aside>

    <main class="main-content">
        <div class="estoque-header">
            <h2>Estoque</h2>
            <div class="estoque-controls">
                <input type="text" id="filtro-peca" placeholder="Filtro nome ou descrição">
                <button class="btn-add" onclick="abrirModal('modal-add')">+</button>
            </div>
        </div>

        <table class="item-list">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Descrição</th>
                    <th>Preço</th>
                    <th>Qtd.</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-pecas"></tbody>
        </table>
    </main>

    <!-- Modal: Adicionar Peça -->
    <div id="modal-add" class="modal-overlay" onclick="fecharModalFora(event, 'modal-add')">
        <div class="modal-content">
            <h3>Adicionar Peça</h3>
            <input type="text" id="add-nome"  placeholder="Nome da peça">
            <input type="text" id="add-desc"  placeholder="Descrição (opcional)">
            <input type="text" id="add-preco" placeholder="Preço (R$)" inputmode="decimal">
            <div class="modal-row">
                <div class="qty-field">
                    <label class="qty-label">Qtd. inicial</label>
                    <div class="qty-stepper">
                        <button class="qty-btn" type="button" onclick="stepQty('add-quantidade',-1)">−</button>
                        <input type="text" id="add-quantidade" inputmode="numeric" placeholder="0">
                        <button class="qty-btn" type="button" onclick="stepQty('add-quantidade', 1)">+</button>
                    </div>
                </div>
                <div class="qty-field">
                    <label class="qty-label">Qtd. mínima</label>
                    <div class="qty-stepper">
                        <button class="qty-btn" type="button" onclick="stepQty('add-qtd-min',-1)">−</button>
                        <input type="text" id="add-qtd-min" inputmode="numeric" placeholder="0">
                        <button class="qty-btn" type="button" onclick="stepQty('add-qtd-min', 1)">+</button>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel"  onclick="fecharModal('modal-add')">Cancelar</button>
                <button class="btn-confirm" onclick="adicionarPeca()">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Editar Peça -->
    <div id="modal-edit" class="modal-overlay" onclick="fecharModalFora(event, 'modal-edit')">
        <div class="modal-content">
            <h3>Editar Peça</h3>
            <input type="text" id="edit-nome"  placeholder="Nome da peça">
            <input type="text" id="edit-desc"  placeholder="Descrição (opcional)">
            <input type="text" id="edit-preco" placeholder="Preço (R$)" inputmode="decimal">
            <div class="modal-row">
                <div class="qty-field">
                    <label class="qty-label">Quantidade</label>
                    <div class="qty-stepper">
                        <button class="qty-btn" type="button" onclick="stepQty('edit-quantidade',-1)">−</button>
                        <input type="text" id="edit-quantidade" inputmode="numeric" placeholder="0">
                        <button class="qty-btn" type="button" onclick="stepQty('edit-quantidade', 1)">+</button>
                    </div>
                </div>
                <div class="qty-field">
                    <label class="qty-label">Qtd. mínima</label>
                    <div class="qty-stepper">
                        <button class="qty-btn" type="button" onclick="stepQty('edit-qtd-min',-1)">−</button>
                        <input type="text" id="edit-qtd-min" inputmode="numeric" placeholder="0">
                        <button class="qty-btn" type="button" onclick="stepQty('edit-qtd-min', 1)">+</button>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel"  onclick="fecharModal('modal-edit')">Cancelar</button>
                <button class="btn-confirm" onclick="salvarEdicao()">Salvar Edição</button>
            </div>
        </div>
    </div>

    <!-- Modal: Deletar Peça -->
    <div id="modal-delete" class="modal-overlay" onclick="fecharModalFora(event, 'modal-delete')">
        <div class="modal-content modal-confirm">
            <h3>Deseja deletar mesmo?</h3>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="deletarPeca()">Sim</button>
                <button class="btn-reject"  onclick="fecharModal('modal-delete')">Não</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
