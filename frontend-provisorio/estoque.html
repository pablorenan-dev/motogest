<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estoque - Motogest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-placeholder">M</div>
        <a href="home.html" class="nav-item">- Home</a>
        <a href="estoque.html" class="nav-item active">- Estoque</a>
    </aside>

    <main class="main-content">
        <div class="estoque-header">
            <h2>Estoque</h2>
            <div class="estoque-controls">
                <input type="text" placeholder="Filtro nome peça">
                <button class="btn-add" onclick="abrirModal('modal-add')">+</button>
            </div>
        </div>

        <ul class="item-list" id="lista-pecas"></ul>
    </main>

    <div id="modal-add" class="modal-overlay" onclick="fecharModalFora(event, 'modal-add')">
        <div class="modal-content">
            <h3>Adicionar Peça</h3>
            <input type="text" id="add-nome" placeholder="nome da peça">
            <input type="text" id="add-desc" placeholder="descrição">
            <input type="number" id="add-preco" placeholder="preço">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modal-add')">Cancelar</button>
                <button class="btn-confirm" onclick="adicionarPeca()">Adicionar</button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="modal-overlay" onclick="fecharModalFora(event, 'modal-edit')">
        <div class="modal-content">
            <h3>Editar Peça</h3>
            <input type="text" id="edit-nome" placeholder="nome da peça">
            <input type="text" id="edit-desc" placeholder="descrição">
            <input type="number" id="edit-preco" placeholder="preço">
            <input type="number" id="edit-quantidade" placeholder="quantidade">
            <input type="number" id="edit-qtd-min" placeholder="quantidade mínima">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modal-edit')">Cancelar</button>
                <button class="btn-confirm" onclick="salvarEdicao()">Salvar Edição</button>
            </div>
        </div>
    </div>

    <div id="modal-delete" class="modal-overlay" onclick="fecharModalFora(event, 'modal-delete')">
        <div class="modal-content" style="width: auto;">
            <h3 style="margin-bottom: 10px;">Deseja deletar mesmo?</h3>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="deletarPeca()">Sim</button>
                <button class="btn-reject" onclick="fecharModal('modal-delete')">Não</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
